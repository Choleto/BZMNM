{# Коя страница е активна: home | wardrobe | map | chat | login | register — за подчертаване в менюто #}
<header class="bc-navbar" role="banner">
    <div class="bc-navbar__bar">
        <div class="bc-navbar__start">
            <button type="button" class="bc-navbar__toggle" id="bcNavToggle" aria-expanded="false" aria-controls="bcNavMenu" aria-label="Отвори менюто">
                <span class="bc-navbar__toggle-line"></span>
                <span class="bc-navbar__toggle-line"></span>
                <span class="bc-navbar__toggle-line"></span>
            </button>
            <a href="{% if session.get('user_id') %}{{ url_for('home') }}{% else %}{{ url_for('login') }}{% endif %}" class="bc-navbar__logo" title="Начало" aria-label="Начало">👕</a>
        </div>

        <a href="{% if session.get('user_id') %}{{ url_for('home') }}{% else %}{{ url_for('login') }}{% endif %}" class="bc-navbar__brand">Bio Clother</a>

        <nav class="bc-navbar__menu" id="bcNavMenu" aria-label="Основна навигация">
            <div class="bc-navbar__links">
                {% if session.get('user_id') %}
                <a href="{{ url_for('home') }}#add-clothes" class="bc-navbar__link{% if active_page == 'home' %} is-active{% endif %}">Добави дреха</a>
                <a href="{{ url_for('map_page') }}" class="bc-navbar__link{% if active_page == 'map' %} is-active{% endif %}">Дари</a>
                <a href="{{ url_for('wardrobe') }}" class="bc-navbar__link{% if active_page == 'wardrobe' %} is-active{% endif %}">Гардероб</a>
                <a href="{{ url_for('ai_assistant') }}" class="bc-navbar__link bc-navbar__link--chat{% if active_page == 'chat' %} is-active{% endif %}">Чат с AI</a>
                <a href="{{ url_for('logout') }}" class="bc-navbar__link bc-navbar__link--logout">Изход</a>
                {% else %}
                <a href="{{ url_for('ai_assistant') }}" class="bc-navbar__link bc-navbar__link--chat{% if active_page == 'chat' %} is-active{% endif %}">Чат с AI</a>
                <a href="{{ url_for('login') }}" class="bc-navbar__link{% if active_page == 'login' %} is-active{% endif %}">Вход</a>
                <a href="{{ url_for('register') }}" class="bc-navbar__link{% if active_page == 'register' %} is-active{% endif %}">Регистрация</a>
                {% endif %}
            </div>
        </nav>
    </div>
</header>

<!-- Скрипт: отваря/затваря мобилното меню и при клик на линк затваря менюто на малък екран -->
<script>
(function () {
    var menuButton = document.getElementById('bcNavToggle');
    var menuPanel = document.getElementById('bcNavMenu');
    if (!menuButton || !menuPanel) {
        return;
    }
    menuButton.addEventListener('click', function () {
        var menuIsOpen = menuPanel.classList.toggle('is-open');
        if (menuIsOpen) {
            menuButton.setAttribute('aria-expanded', 'true');
        } else {
            menuButton.setAttribute('aria-expanded', 'false');
        }
    });
    var links = menuPanel.querySelectorAll('a');
    var i;
    for (i = 0; i < links.length; i++) {
        links[i].addEventListener('click', function () {
            var isSmallScreen = window.matchMedia('(max-width: 900px)').matches;
            if (isSmallScreen) {
                menuPanel.classList.remove('is-open');
                menuButton.setAttribute('aria-expanded', 'false');
            }
        });
    }
})();
</script>
