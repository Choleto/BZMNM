<!DOCTYPE html>
<!-- Страница за вход: изпраща POST към същия маршрут /login; при успех — сесия и redirect -->
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioClother — Вход</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='page-shell.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='app_header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% set active_page = 'login' %}
    {% include 'includes/app_header.html' %}

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <ul class="flash-list">
                    {% for category, message in messages %}
                        <li class="flash flash-{{ category }}">{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        <!-- Полетата username и password се четат в app.py функция login() -->
        <form class="card" method="post" action="{{ url_for('login') }}">
            <h2>Вход</h2>
            <label for="username">Потребителско име</label>
            <input type="text" id="username" name="username" required autocomplete="username">

            <label for="password">Парола</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">

            <button type="submit">Влез</button>
        </form>

        <p class="muted">Нямаш акаунт? <a href="{{ url_for('register') }}">Регистрирай се</a></p>
    </div>
</body>
</html>
