<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WearTrack — Чат с AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='page-shell.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='app_header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='chat.css') }}">
</head>
<body class="chat-body" data-chat-send-url="/Ai_assistant/chat">
    {% set active_page = 'chat' %}
    {% include 'includes/app_header.html' %}

    <main class="chat-layout">
        <div class="chat-card">

            <!-- Горна част на картата: икона, заглавие, статус -->
            <div class="chat-card-header">
                <div class="chat-card-header-icon" aria-hidden="true"><span class="chat-card-header-logo">W</span></div>
                <div>
                    <h1 class="chat-card-title">Чат с AI</h1>
                    <p class="chat-card-subtitle">Питай за дрехи, дарения и устойчивост</p>
                </div>
                <div class="chat-status">
                    <span class="chat-status-dot"></span>Онлайн
                </div>
            </div>

            <!-- Съобщенията — превъртат се тук -->
            <ul class="chat-log" id="chatLog" aria-live="polite" aria-label="Разговор">

                {% for entry in chat_history %}
                    <li class="chat-msg chat-msg--{{ 'user' if entry.role == 'user' else 'ai' }}">
                        <div class="chat-icon" aria-hidden="true"></div>
                        <div class="chat-bubble">{{ entry.content }}</div>
                    </li>
                {% endfor %}

                <!-- Три точки, докато AI мисли -->
                <li class="chat-typing" id="chatTyping" hidden aria-hidden="true">
                    <div class="chat-icon"></div>
                    <div class="chat-bubble">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </div>
                </li>

            </ul>

            <!-- Долу: поле за писане и изпращане -->
            <div class="chat-input-area">
                <p class="chat-quota" id="chatQuota" hidden></p>
                <p class="chat-error" id="chatError" hidden role="alert"></p>
                <form class="chat-form" id="chatForm">
                    <label class="visually-hidden" for="chatInput">Твоето съобщение</label>
                    <textarea id="chatInput" rows="1" maxlength="3500" placeholder="Напиши нещо… (Enter за изпращане)"></textarea>
                    <button type="submit" class="chat-send" id="chatSend" aria-label="Изпрати">
                        <!-- Икона самолетче за изпращане -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 2 11 13"/>
                            <path d="M22 2 15 22 11 13 2 9l20-7z"/>
                        </svg>
                    </button>
                </form>
            </div>

        </div>
    </main>

    {% include 'includes/app_footer.html' %}
    <script src="{{ url_for('static', filename='chat.js') }}"></script>
</body>
</html>
