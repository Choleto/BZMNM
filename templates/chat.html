<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Clothes — Чат с AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='page-shell.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='app_header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='chat.css') }}">
</head>
<body class="chat-body" data-chat-send-url="/chat/message">
    {% set active_page = 'chat' %}
    {% include 'includes/app_header.html' %}

    <main class="chat-layout">
        <div class="chat-intro">
            <h1 class="chat-intro__title">Чат с AI</h1>
            <p class="chat-intro__text">Питай за дрехи, дарения и устойчивост — отговорът идва от сървъра.</p>
        </div>

        <div class="chat-panel">
            <ul class="chat-log" id="chatLog" aria-live="polite"></ul>
            <form class="chat-form" id="chatForm">
                <label class="visually-hidden" for="chatInput">Твоето съобщение</label>
                <textarea id="chatInput" rows="4" placeholder="Напиши нещо…"></textarea>
                <button type="submit" class="chat-send" id="chatSend">Изпрати</button>
            </form>
            <p class="chat-error" id="chatError" hidden role="alert"></p>
        </div>
    </main>

    <script src="{{ url_for('static', filename='chat.js') }}"></script>
</body>
</html>
