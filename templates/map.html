<!DOCTYPE html>
<!-- Страница с карта: MapTiler + списък с пунктове за дарения -->
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Clothes - MapTiler Edition</title>
    
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.umd.min.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="{{ url_for('static', filename='page-shell.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='mapstyle.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='app_header.css') }}">
</head>
<body>
<!-- Активна страница за навигацията -->
{% set active_page = 'map' %}
{% include 'includes/app_header.html' %}

<div class="page-container">
    <!-- Заглавие и описание -->
    <header class="page-title">
        <h2>Национална мрежа за дарения</h2>
        <p>Намерете контейнери на БЧК и пунктове за дрехи в цяла България.</p>
    </header>

    <!-- Търсене: извиква filterLocations() от mapscript.js при писане и при бутон -->
    <section class="search-section">
        <div class="search-box">
            <input type="text" id="addressSearch" placeholder="Търси град (София, Варна, Бургас...) или адрес..." oninput="filterLocations()">
            <button onclick="filterLocations()">Търси</button>
        </div>
    </section>

    <div class="main-layout">
        <!-- Тук MapTiler рисува картата -->
        <div id="map"></div>
        
        <aside class="legend">
            <h3>Легенда</h3>
            <div class="legend-item"><span class="dot red"></span> Контейнер БЧК</div>
            <div class="legend-item"><span class="dot green"></span> Агенция</div>
            <div class="legend-item"><span class="dot blue"></span> Събитие</div>
        </aside>
    </div>

    <!-- Списъкът се пълни с JavaScript; #count е броят намерени места -->
    <section class="locations-list">
        <h3>Намерени локации (<span id="count">0</span>):</h3>
        <ul id="locationsUl"></ul>
    </section>
</div>

<!-- Логика за маркери, търсене и списък -->
<script src="{{ url_for('static', filename='mapscript.js') }}"></script>
</body>
</html>
